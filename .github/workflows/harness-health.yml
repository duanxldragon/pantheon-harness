name: Harness Method Health

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Run Harness Script Tests
        run: node --test scripts/harness/*.test.mjs

      - name: Run Verify Script Tests
        run: node --test verify/scripts/*.test.mjs

  health-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Run Method Health Check
        run: node scripts/harness/check-method-health.mjs --root . --strict

      - name: Run Adoption Check
        run: node scripts/harness/check-adoption.mjs --root . --strict

      - name: Check Failure Registry
        run: node scripts/harness/check-failure-registry.mjs --root . --strict

      - name: Check Sync Drift
        run: node scripts/harness/check-sync-drift.mjs --root . --strict

  docs-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Check Doc Frontmatter
        run: node scripts/harness/check-doc-frontmatter.mjs --root . --strict

      - name: Check Encoding
        run: node scripts/harness/check-encoding.mjs --root . --strict

      - name: Check Doc Links
        run: node scripts/harness/check-doc-links.mjs --root . --strict

      - name: Check Doc Inventory
        run: node scripts/harness/check-doc-inventory.mjs --root . --strict

  artifact-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Check Template Health
        run: node scripts/harness/check-template-health.mjs --root . --strict

      - name: Check Task Packet
        run: node scripts/harness/check-task-packet.mjs --root .

      - name: Check Evidence
        run: node scripts/harness/check-evidence.mjs --root . --strict

      - name: Check Review
        run: node scripts/harness/check-review.mjs --root . --strict

      - name: Check Graph Review
        run: node scripts/harness/check-graph-review.mjs --root . --strict

      - name: Check Visual Evidence
        run: node scripts/harness/check-visual-evidence.mjs --root . --strict

      - name: Check Runtime Evidence
        run: node scripts/harness/check-runtime-evidence.mjs --root . --strict
